<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老人行为健康监测系统 - 登录</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 登录页面专属样式 */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #1a73e8 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        /* 浮动装饰圆点 */
        .floating-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            animation: float 6s ease-in-out infinite;
        }

        .floating-circle:nth-child(1) {
            width: 150px;
            height: 150px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-circle:nth-child(2) {
            width: 100px;
            height: 100px;
            top: 60%;
            right: 15%;
            animation-delay: 2s;
        }

        .floating-circle:nth-child(3) {
            width: 80px;
            height: 80px;
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 2rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #1a73e8);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-logo {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 1rem;
            color: #5f6368;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .form-input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 1rem 3rem 1rem 1rem;
            border: 2px solid #e8eaed;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-input:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
        }

        .input-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.125rem;
            color: #9aa0a6;
        }

        .captcha-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .captcha-image {
            flex: 1;
            height: 48px;
            border: 2px solid #e8eaed;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            font-family: 'Courier New', monospace;
            font-size: 1.25rem;
            font-weight: bold;
            color: #1a73e8;
            letter-spacing: 4px;
            transition: all 0.3s ease;
        }

        .captcha-image:hover {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
        }

        .refresh-btn {
            background: none;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            color: #9aa0a6;
            transition: color 0.3s ease;
        }

        .refresh-btn:hover {
            color: #1a73e8;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #1a73e8 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 115, 232, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .error-message {
            color: #ea4335;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .error-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .error-message::before {
            content: '⚠️';
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.875rem;
        }

        /* 登录成功动画 */
        .login-success {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #1a73e8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        .login-success.show {
            opacity: 1;
            visibility: visible;
        }

        .success-content {
            text-align: center;
            color: white;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }

        .success-text {
            font-size: 1.5rem;
            font-weight: 600;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .login-wrapper {
                padding: 1rem;
            }

            .login-card {
                padding: 2rem 1.5rem;
            }

            .login-title {
                font-size: 1.5rem;
            }

            .form-input {
                padding: 0.875rem 2.5rem 0.875rem 0.875rem;
            }

            .captcha-image {
                height: 40px;
            }

            .login-btn {
                padding: 0.875rem;
            }
        }
    </style>
</head>
<body>
    <!-- 装饰性浮动圆点 -->
    <div class="floating-circle"></div>
    <div class="floating-circle"></div>
    <div class="floating-circle"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">👴</div>
                <h1 class="login-title">老人行为健康监测系统</h1>
                <p class="login-subtitle">请登录以访问监测数据</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">账号</label>
                    <div class="form-input-wrapper">
                        <input type="text" id="username" class="form-input" placeholder="请输入账号" autocomplete="username">
                        <span class="input-icon">👤</span>
                    </div>
                    <div class="error-message" id="usernameError"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <div class="form-input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="请输入密码" autocomplete="current-password">
                        <span class="input-icon">🔒</span>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="captcha">验证码</label>
                    <div class="captcha-container">
                        <canvas id="captcha" class="captcha-image" onclick="refreshCaptcha()"></canvas>
                        <button type="button" class="refresh-btn" onclick="refreshCaptcha()">🔄</button>
                    </div>
                    <input type="text" id="captchaInput" class="form-input" placeholder="请输入验证码" style="margin-top: 0.5rem;">
                    <div class="error-message" id="captchaError"></div>
                </div>
                
                <button type="submit" class="login-btn">登录系统</button>
            </form>
        </div>
        
        <div class="footer">
            <p>&copy; 2026 老人行为健康监测系统 | 保护老人安全，守护家庭幸福</p>
        </div>
    </div>

    <!-- 登录成功动画 -->
    <div class="login-success" id="loginSuccess">
        <div class="success-content">
            <div class="success-icon">✅</div>
            <div class="success-text">登录成功，正在进入系统...</div>
        </div>
    </div>

    <script>
        // 全局变量
        let captchaText = '';
        
        // 初始化
        function init() {
            generateCaptcha();
            setupFormValidation();
        }
        
        // 生成验证码
        function generateCaptcha() {
            const canvas = document.getElementById('captcha');
            const ctx = canvas.getContext('2d');
            
            // 设置画布尺寸
            canvas.width = 200;
            canvas.height = 48;
            
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 生成随机验证码
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            captchaText = '';
            for (let i = 0; i < 4; i++) {
                captchaText += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            // 绘制背景
            ctx.fillStyle = '#f8f9fa';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制干扰线
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.strokeStyle = `rgba(26, 115, 232, ${Math.random() * 0.3 + 0.1})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            
            // 绘制干扰点
            for (let i = 0; i < 30; i++) {
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 1, 0, 2 * Math.PI);
                ctx.fillStyle = `rgba(26, 115, 232, ${Math.random() * 0.3 + 0.1})`;
                ctx.fill();
            }
            
            // 绘制验证码文本
            ctx.font = '24px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 为每个字符设置不同的颜色和旋转角度
            for (let i = 0; i < captchaText.length; i++) {
                const x = (canvas.width / captchaText.length) * (i + 0.5);
                const y = canvas.height / 2;
                const angle = (Math.random() - 0.5) * 0.5; // -0.25 到 0.25 弧度
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                
                // 随机颜色
                const colors = ['#1a73e8', '#34a853', '#fbbc05', '#ea4335', '#1098ad'];
                ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                
                ctx.fillText(captchaText[i], 0, 0);
                ctx.restore();
            }
        }
        
        // 刷新验证码
        function refreshCaptcha() {
            generateCaptcha();
            hideError('captchaError');
        }
        
        // 设置表单验证
        function setupFormValidation() {
            const form = document.getElementById('loginForm');
            
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const captchaInput = document.getElementById('captchaInput').value.trim();
                
                let isValid = true;
                
                // 验证账号
                if (!username) {
                    showError('usernameError', '请输入账号');
                    isValid = false;
                } else {
                    hideError('usernameError');
                }
                
                // 验证密码
                if (!password) {
                    showError('passwordError', '请输入密码');
                    isValid = false;
                } else {
                    hideError('passwordError');
                }
                
                // 验证验证码
                if (!captchaInput) {
                    showError('captchaError', '请输入验证码');
                    isValid = false;
                } else if (captchaInput.toLowerCase() !== captchaText.toLowerCase()) {
                    showError('captchaError', '验证码错误');
                    isValid = false;
                } else {
                    hideError('captchaError');
                }
                
                // 验证账号密码
                if (isValid) {
                    if (username === 'admin' && password === '123456') {
                        // 登录成功
                        showSuccessAnimation();
                    } else {
                        showError('passwordError', '账号或密码错误');
                    }
                } else {
                    showError('usernameError', '请填写完整信息');
                }
            });
        }
        
        // 显示错误信息
        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.classList.add('show');
        }
        
        // 隐藏错误信息
        function hideError(elementId) {
            const errorElement = document.getElementById(elementId);
            errorElement.classList.remove('show');
        }
        
        // 显示登录成功动画
        function showSuccessAnimation() {
            const successElement = document.getElementById('loginSuccess');
            successElement.classList.add('show');
            
            // 1.5秒后跳转到监测页面
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        }
        
        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
